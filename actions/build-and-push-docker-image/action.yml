name: "Build and push docker image"
description: "Build and push docker image to ghcr.io"
inputs:
  artifact-version:
    required: true
    description: "Created Artifact Version"
  image-name:
    required: true
    description: 'Docker Image Name'

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - name: 'Login to ghcr.io'
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 'Version from Commit'
      id: artifact-version
      uses: navikt/sosialhjelp-ci/actions/create-artifact-version@v2

    - name: 'Setup QEMU and Docker Buildx'
      uses: docker/setup-qemu-action@v3
      with:
        platforms: linux/amd64,linux/arm64

    - name: 'Setup Docker Buildx'
      uses: docker/setup-buildx-action@v3

    - name: 'Create and push multi-arch Docker image'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ inputs.image-name }}:${{ inputs.artifact-version }}
          ${{ github.ref == 'refs/heads/master' && format('{0}:latest', env.DOCKER_IMAGE) }}
        platforms: linux/amd64,linux/arm64
        secrets: |
          "github_token=githubUser=x-access-token
          githubPassword=${{ secrets.GITHUB_TOKEN }}"